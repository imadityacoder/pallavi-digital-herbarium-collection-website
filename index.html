<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Herbarium Collection</title>
    <meta
      name="description"
      content="Explore a curated collection of preserved plant specimens documenting botanical diversity and scientific observation. A premium digital botanical museum experience."
    />
    <meta name="theme-color" content="#2E7D32" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Digital Herbarium Collection" />
    <meta
      property="og:description"
      content="A Scientific Collection of Preserved Plant Specimens — explore botanical diversity through an elegant digital museum experience."
    />
    <meta property="og:image" content="/og-image.svg" />

    <!-- GitHub Pages SPA redirect handler -->
    <script type="text/javascript">
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "Digital Herbarium Collection",
        "description": "A scientific collection of preserved plant specimens documenting botanical diversity and scientific observation.",
        "about": {
          "@type": "Thing",
          "name": "Botanical Herbarium"
        },
        "author": {
          "@type": "Person",
          "name": "Pallavi Kumari"
        },
        "isPartOf": {
          "@type": "EducationalOrganization",
          "name": "B.N. College"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
